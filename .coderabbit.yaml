inheritance: true

reviews:
  request_changes_workflow: true
  high_level_summary_instructions: |
    Short and simple, keep it cohesive, no complex wording, assume everyone including the
    PR reviewer is new to the tiptap-docs repository or to code in general - simple english so
    even non-english native speakers understand everything just fine.
  high_level_summary_in_walkthrough: true
  in_progress_fortune: false
  suggested_labels: true
  auto_apply_labels: true
  labeling_instructions:
    - label: 'area: ai'
      instructions: Apply this label if the PR changes AI or AI Toolkit documentation.
    - label: 'area: authentication'
      instructions: Apply this label if the PR changes authentication or access documentation.
    - label: 'area: collaboration'
      instructions: Apply this label if the PR changes collaboration documentation or integrations.
    - label: 'area: comments'
      instructions: Apply this label if the PR changes comments documentation or integrations.
    - label: 'area: conversion'
      instructions: Apply this label if the PR changes content conversion documentation.
    - label: 'area: docs'
      instructions: Apply this label if the PR changes repository documentation, guides, or API reference content.
    - label: 'area: editor'
      instructions: Apply this label if the PR changes editor APIs, extensions, commands, or user-facing behavior documented in tiptap-docs.
    - label: 'area: examples'
      instructions: Apply this label if the PR changes examples or integration demos.
    - label: 'area: guides'
      instructions: Apply this label if the PR changes getting started or how-to guides.
    - label: 'area: hocuspocus'
      instructions: Apply this label if the PR changes Hocuspocus collaboration server documentation.
    - label: 'area: pages'
      instructions: Apply this label if the PR changes Pages or pagination documentation.
    - label: 'area: resources'
      instructions: Apply this label if the PR changes reference resources or supporting content.
    - label: 'area: tracked-changes'
      instructions: Apply this label if the PR changes Tracked Changes documentation.
    - label: 'area: ui-components'
      instructions: Apply this label if the PR changes UI components documentation or examples.
    - label: 'complexity: easy'
      instructions: Apply this label if the PR makes a clearly scoped change in one isolated docs section or package reference.
    - label: 'complexity: expert'
      instructions: Apply this label if the PR changes fundamental architecture, core APIs across extensions, or collaboration behavior.
    - label: 'complexity: hard'
      instructions: Apply this label if the PR changes ProseMirror internals, transaction handling, or node view rendering.
    - label: 'complexity: medium'
      instructions: Apply this label if the PR changes multiple docs sections or the ProseMirror/tiptap-docs integration with a clear implementation path.
    - label: 'complexity: trivial'
      instructions: Apply this label if the PR is an obvious change under 10 lines, such as a documentation typo or missing type check.
    - label: 'good first issue'
      instructions: Apply this label if the PR is a small, self-contained change that is easy for a first-time contributor to understand.
    - label: 'impact: critical'
      instructions: Apply this label if the PR fixes data loss, a security vulnerability, broken core functionality, or a problem affecting nearly all users of a feature.
    - label: 'impact: high'
      instructions: Apply this label if the PR fixes behavior affecting a large portion of users or a common workflow.
    - label: 'impact: low'
      instructions: Apply this label if the PR fixes an obscure edge case, a specific browser condition, or a rarely used feature.
    - label: 'impact: medium'
      instructions: Apply this label if the PR fixes a common feature usage or a workflow shared by a group of users.
  auto_review:
    ignore_usernames:
      - github-actions[bot]

issue_enrichment:
  auto_enrich:
    enabled: true
  labeling:
    auto_apply_labels: true
    labeling_instructions:
      - label: 'area: ai'
        instructions: Add this label if an item is related to AI or AI Toolkit documentation.
      - label: 'area: authentication'
        instructions: Add this label if an item is related to authentication or access documentation.
      - label: 'area: collaboration'
        instructions: Add this label if an item is related to collaboration documentation or integrations.
      - label: 'area: comments'
        instructions: Add this label if an item is related to comments documentation or integrations.
      - label: 'area: conversion'
        instructions: Add this label if an item is related to content conversion documentation.
      - label: 'area: docs'
        instructions: Add this label if an item is related to repository documentation, guides, or API reference content.
      - label: 'area: editor'
        instructions: Add this label if an item is related to editor APIs, extensions, commands, or user-facing behavior documented in tiptap-docs.
      - label: 'area: examples'
        instructions: Add this label if an item is related to examples or integration demos.
      - label: 'area: guides'
        instructions: Add this label if an item is related to getting started or how-to guides.
      - label: 'area: hocuspocus'
        instructions: Add this label if an item is related to Hocuspocus collaboration server documentation.
      - label: 'area: pages'
        instructions: Add this label if an item is related to Pages or pagination documentation.
      - label: 'area: resources'
        instructions: Add this label if an item is related to reference resources or supporting content.
      - label: 'area: tracked-changes'
        instructions: Add this label if an item is related to Tracked Changes documentation.
      - label: 'area: ui-components'
        instructions: Add this label if an item is related to UI components documentation or examples.
      - label: 'complexity: easy'
        instructions: clearly described, affects one isolated docs section or package reference, fix localized to one area
      - label: 'complexity: expert'
        instructions: fundamental architecture conflict, core API changes affecting all extensions, or concurrent/collaboration behavior
      - label: 'complexity: hard'
        instructions: requires deep understanding of ProseMirror internals, transaction handling, or node view rendering; no obvious solution
      - label: 'complexity: medium'
        instructions: touches multiple docs sections or requires understanding ProseMirror/tiptap-docs interaction, but solution path is clear
      - label: 'complexity: trivial'
        instructions: typo in docs, missing type check, obvious fix in <10 lines
      - label: 'good first issue'
        instructions: Apply this label if the issue is a good ticket to pick up as a first-time contributor or beginner at ProseMirror or tiptap-docs.
      - label: 'impact: critical'
        instructions: data loss, security vulnerability, completely broken core functionality, or affects nearly everyone using a specific feature
      - label: 'impact: high'
        instructions: affects a large portion of users, blocks a common use case, or causes noticeable UX problem many will run into
      - label: 'impact: low'
        instructions: obscure edge case, specific browser under specific conditions, or feature request very few would use
      - label: 'impact: medium'
        instructions: affects a common usage of a feature or a handful of users with similar workflows
